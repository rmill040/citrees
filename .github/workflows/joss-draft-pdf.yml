name: JOSS Draft PDF

on:
  push:
    paths:
      - "paper/joss/**"
      - ".github/workflows/joss-draft-pdf.yml"
  pull_request:
    paths:
      - "paper/joss/**"
      - ".github/workflows/joss-draft-pdf.yml"
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Build JOSS draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install paper test dependencies
        run: uv sync --group dev --group paper-test

      - name: Check paper support metadata
        run: uv run pytest tests/paper/test_paper_package.py -q

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@v1.0
        with:
          journal: joss
          paper-path: paper/joss/paper.md

      - name: Upload draft PDF
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper
          path: paper/joss/paper.pdf
