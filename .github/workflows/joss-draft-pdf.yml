name: JOSS Draft PDF

on:
  push:
    paths:
      - "paper/joss/**"
      - ".github/workflows/joss-draft-pdf.yml"
  pull_request:
    paths:
      - "paper/joss/**"
      - ".github/workflows/joss-draft-pdf.yml"
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Build JOSS draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@v1.0
        with:
          journal: joss
          paper-path: paper/joss/paper.md

      - name: Upload draft PDF
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper
          path: paper/joss/paper.pdf
