name: Paper R Baseline

on:
  push:
    paths:
      - "paper/scripts/pipeline/r_methods.py"
      - "tests/paper/test_stage1.py"
      - ".github/workflows/paper-r-baseline.yml"
  pull_request:
    paths:
      - "paper/scripts/pipeline/r_methods.py"
      - "tests/paper/test_stage1.py"
      - ".github/workflows/paper-r-baseline.yml"
  workflow_dispatch:

jobs:
  r-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system R
        run: |
          sudo apt-get update
          sudo apt-get install -y r-base r-base-dev libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Configure R user library
        run: |
          echo "R_LIBS_USER=$HOME/R/library" >> "$GITHUB_ENV"
          mkdir -p "$HOME/R/library"

      - name: Install partykit
        run: |
          Rscript -e 'options(Ncpus=2); install.packages("partykit", lib=Sys.getenv("R_LIBS_USER"), repos="https://cloud.r-project.org")'
          Rscript -e 'stopifnot(requireNamespace("partykit", quietly=TRUE)); print(packageVersion("partykit"))'

      - name: Install uv
        run: python -m pip install uv

      - name: Install Python dependencies
        run: uv sync --group dev --group paper-test

      - name: Check rpy2 bridge
        run: |
          uv run --with rpy2 python - <<'PY'
          from paper.scripts.pipeline.r_methods import _get_partykit

          _get_partykit()
          print("rpy2/partykit bridge ok")
          PY

      - name: Run R baseline tests
        run: uv run --with rpy2 pytest tests/paper/test_stage1.py -k RCtree -q -rs
