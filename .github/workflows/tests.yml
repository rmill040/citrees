name: Tests and Docs

on:
  push:
    paths:
      - "citrees/**"
      - "docs/**"
      - "examples/**"
      - "paper/README.md"
      - "paper/arxiv/**"
      - "paper/docs/**"
      - "paper/joss/**"
      - "paper/results/README.md"
      - "paper/results/tables/README.md"
      - "paper/results/tables/*.csv"
      - "paper/results/tables/*.json"
      - "paper/scripts/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "tests/paper/**"
      - "pyproject.toml"
      - "uv.lock"
      - "mkdocs.yml"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "citrees/**"
      - "docs/**"
      - "examples/**"
      - "paper/README.md"
      - "paper/arxiv/**"
      - "paper/docs/**"
      - "paper/joss/**"
      - "paper/results/README.md"
      - "paper/results/tables/README.md"
      - "paper/results/tables/*.csv"
      - "paper/results/tables/*.json"
      - "paper/scripts/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "tests/paper/**"
      - "pyproject.toml"
      - "uv.lock"
      - "mkdocs.yml"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev --group docs

      - name: Check formatting
        run: uv run ruff format --check citrees examples tests/unit tests/integration

      - name: Lint
        run: uv run ruff check citrees examples tests/unit tests/integration

      - name: Run unit and integration tests
        run: uv run pytest tests/unit tests/integration -m "not slow"

      - name: Run example smoke test
        run: uv run python examples/basic_usage.py

      - name: Build distributions
        run: uv build --wheel --sdist

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/citrees-wheel-smoke
          /tmp/citrees-wheel-smoke/bin/python -m pip install dist/citrees-*.whl
          cd /tmp
          /tmp/citrees-wheel-smoke/bin/python - <<'PY'
          import numpy as np
          from citrees import ConditionalInferenceTreeClassifier

          X = np.array([[0.0], [0.1], [1.0], [1.1]])
          y = np.array([0, 0, 1, 1])
          clf = ConditionalInferenceTreeClassifier(random_state=1718, max_depth=1)
          clf.fit(X, y)
          predictions = clf.predict(X)
          probabilities = clf.predict_proba(X)
          assert predictions.shape == (4,)
          assert probabilities.shape == (4, 2)
          PY

      - name: Build docs
        run: uv run mkdocs build --strict

  paper-support:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install paper test dependencies
        run: uv sync --group dev --group paper-test

      - name: Check paper support formatting
        run: uv run ruff format --check tests/paper paper/scripts/analysis paper/scripts/data_generation

      - name: Lint paper support code
        run: uv run ruff check tests/paper paper/scripts/analysis paper/scripts/data_generation paper/scripts/pipeline

      - name: Run paper support tests
        run: uv run pytest tests/paper -q
