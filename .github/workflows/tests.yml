name: Tests and Docs

on:
  push:
    paths:
      - "citrees/**"
      - "docs/**"
      - "examples/**"
      - "paper/README.md"
      - "paper/docs/**"
      - "paper/results/README.md"
      - "paper/results/tables/README.md"
      - "paper/scripts/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "tests/paper/**"
      - "pyproject.toml"
      - "uv.lock"
      - "mkdocs.yml"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "citrees/**"
      - "docs/**"
      - "examples/**"
      - "paper/README.md"
      - "paper/docs/**"
      - "paper/results/README.md"
      - "paper/results/tables/README.md"
      - "paper/scripts/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "tests/paper/**"
      - "pyproject.toml"
      - "uv.lock"
      - "mkdocs.yml"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev --group docs

      - name: Check formatting
        run: uv run ruff format --check citrees examples tests/unit tests/integration

      - name: Lint
        run: uv run ruff check citrees examples tests/unit tests/integration

      - name: Run unit and integration tests
        run: uv run pytest tests/unit tests/integration -m "not slow"

      - name: Run example smoke test
        run: uv run python examples/basic_usage.py

      - name: Build docs
        run: uv run mkdocs build --strict

  paper-support:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install paper test dependencies
        run: uv sync --group dev --group paper-test

      - name: Check paper test formatting
        run: uv run ruff format --check tests/paper

      - name: Lint paper tests and selectors
        run: uv run ruff check tests/paper paper/scripts/pipeline/selectors.py

      - name: Run paper support tests
        run: uv run pytest tests/paper -q
