name: Tests and Docs

on:
  push:
    paths:
      - "citrees/**"
      - "docs/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "pyproject.toml"
      - "uv.lock"
      - "mkdocs.yml"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "citrees/**"
      - "docs/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "pyproject.toml"
      - "uv.lock"
      - "mkdocs.yml"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev --group docs

      - name: Check formatting
        run: uv run ruff format --check citrees tests/unit tests/integration

      - name: Lint
        run: uv run ruff check citrees tests/unit tests/integration

      - name: Run unit and integration tests
        run: uv run pytest tests/unit tests/integration -m "not slow"

      - name: Build docs
        run: uv run mkdocs build --strict
