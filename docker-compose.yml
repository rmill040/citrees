# citrees Docker Compose configuration
# For local validation (real experiments run distributed on EC2)

services:
  # Local validation - run nested CV on tiny dataset
  validate:
    build: .
    volumes:
      - .:/app
      - ~/.aws:/root/.aws:ro
    environment:
      - LOCAL_TEST=1
    command: uv run python paper/scripts/nested_cv_worker.py

  # Run pytest
  test:
    build: .
    volumes:
      - .:/app
    command: uv run pytest tests/ -v --tb=short

  # Run specific test file
  test-selectors:
    build: .
    volumes:
      - .:/app
    command: uv run pytest tests/unit/test_selector.py -v

  # Run specific test file
  test-importance:
    build: .
    volumes:
      - .:/app
    command: uv run pytest tests/unit/test_importance.py -v

  # Interactive shell for debugging
  shell:
    build: .
    volumes:
      - .:/app
      - ~/.aws:/root/.aws:ro
    stdin_open: true
    tty: true
    command: /bin/bash

  # Quick sanity check - test imports and basic functionality (no volume mount to avoid venv conflicts)
  sanity:
    build: .
    command: ["uv", "run", "python", "-c", "from citrees import ConditionalInferenceTreeClassifier; from sklearn.datasets import make_classification; X, y = make_classification(n_samples=100, n_features=10, random_state=42); clf = ConditionalInferenceTreeClassifier(verbose=0); clf.fit(X, y); print(f'Tree max_depth: {clf.max_depth}'); print(f'Features used: {sum(clf.feature_importances_ > 0)}'); print('Sanity check passed!')"]
