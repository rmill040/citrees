# citrees Experiment Configuration
#
# Experiment scheduling and S3 settings for distributed experiments.

aws_region: us-east-1
# Note: S3 bucket name is derived automatically as citrees-{account_id} by aws.py

experiment:
  n_seeds: 5

  # Validate each parquet upload with an extra S3 `head_object` call.
  s3_validate_uploads: true
