# citrees Experiment Configuration
#
# Ray scheduling and S3 settings for distributed experiments.

aws_region: us-east-1
# Note: S3 bucket name is derived automatically as citrees-{account_id} by setup_cluster.py

cluster:
  # Global limit on total workers (Ray defaults to 2 if not set!)
  max_workers: 500
  # Scale up aggressively to handle large workloads
  upscaling_speed: 50.0
  # Terminate idle workers after this many minutes
  idle_timeout_minutes: 5

experiment:
  # "classification" or "regression"
  type: classification
  n_seeds: 5
  stale_timeout_minutes: 30

  # Ray CPU scheduling (per config) - Stage 1 (feature selection)
  # - Lightweight methods pack densely (default=1 CPU)
  # - Threaded methods (rf/et/xgb/lgbm/cat/...) reserve more (threaded=8 CPUs)
  # - CIF can scale more on large datasets: use `selection_cpus_cif_large` when
  #   `n_samples * n_features >= selection_cif_large_threshold`
  selection_cpus_default: 1
  selection_cpus_threaded: 8
  selection_cpus_cif: 16
  selection_cpus_cif_large: 32
  selection_cif_large_threshold: 10000000

  # Optional per-method CPU overrides (base method name -> CPU count)
  # Overrides take precedence over the CIF size rule and threaded/default buckets.
  selection_cpus_overrides: {}

  # Ray memory scheduling for Stage 1 (in GB)
  selection_memory_gb_default: 4.0
  selection_memory_gb_overrides: {}

  # Ray CPU scheduling (per config) - Stage 2 (downstream evaluation)
  evaluation_cpus_default: 1
  evaluation_cpus_overrides: {}

  # Ray memory scheduling for Stage 2 (in GB)
  evaluation_memory_gb_default: 2.0
  evaluation_memory_gb_overrides: {}

  # Validate each parquet upload with an extra S3 `head_object` call.
  s3_validate_uploads: true
