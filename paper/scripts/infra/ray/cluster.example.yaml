# Ray Cluster Configuration Template
#
# Usage:
#   1. Full setup: citrees-exp infra setup
#   2. Deploy:     citrees-exp cluster up --yes
#
# Placeholders (replaced during --generate):
#   __MY_IP__               - Your public IP for security group rules
#   __S3_BUCKET__           - S3 bucket for results (citrees-{account_id})
#   __AWS_ACCOUNT__         - AWS account ID
#   __GIT_SHA__             - Current git commit SHA
#   __REGION__              - AWS region (us-east-1)
#   __MAX_WORKERS__         - Max total workers (from config.yaml)
#   __UPSCALING_SPEED__     - Autoscaler aggressiveness (from config.yaml)
#   __IDLE_TIMEOUT_MINUTES__ - Idle worker timeout (from config.yaml)
#
# IAM: Created by --setup (citrees-ray-autoscaler role with EC2 + S3 + ECR permissions)

cluster_name: citrees

# Cluster autoscaler settings (from config.yaml)
max_workers: __MAX_WORKERS__
upscaling_speed: __UPSCALING_SPEED__
idle_timeout_minutes: __IDLE_TIMEOUT_MINUTES__

provider:
  type: aws
  region: us-east-1
  # IAM permissions for S3 + ECR
  iam:
    IamInstanceProfile:
      Arn: arn:aws:iam::__AWS_ACCOUNT__:instance-profile/citrees-ray-autoscaler
  security_group:
    GroupName: ray-citrees-sg
    IpPermissions:
      # SSH - restricted to your IP
      - FromPort: 22
        ToPort: 22
        IpProtocol: tcp
        IpRanges:
          - CidrIp: __MY_IP__/32
      # Ray GCS
      - FromPort: 6379
        ToPort: 6379
        IpProtocol: tcp
        IpRanges:
          - CidrIp: __MY_IP__/32
      # Ray dashboard
      - FromPort: 8265
        ToPort: 8265
        IpProtocol: tcp
        IpRanges:
          - CidrIp: __MY_IP__/32
      # Ray client
      - FromPort: 10001
        ToPort: 10001
        IpProtocol: tcp
        IpRanges:
          - CidrIp: __MY_IP__/32

auth:
  ssh_user: ubuntu

# Install Docker on all nodes before Ray setup (required for docker: image).
initialization_commands:
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sudo sh get-docker.sh
  - sudo usermod -aG docker $USER
  - sudo systemctl restart docker -f
  - sudo apt-get update -y
  - sudo apt-get install -y awscli
  - aws ecr get-login-password --region __REGION__ | docker login --username AWS
    --password-stdin __AWS_ACCOUNT__.dkr.ecr.__REGION__.amazonaws.com

# Docker image (pre-built with R, uv, and all dependencies)
docker:
  image: __AWS_ACCOUNT__.dkr.ecr.__REGION__.amazonaws.com/citrees-__AWS_ACCOUNT__:latest
  container_name: ray_container
  pull_before_run: true
  run_options:
    - --ulimit nofile=65536:65536

available_node_types:
  head:
    node_config:
      InstanceType: c6i.4xlarge
      ImageId: ami-0030e4319cbf4dbf2 # Ubuntu 22.04 us-east-1
      IamInstanceProfile:
        Arn: arn:aws:iam::__AWS_ACCOUNT__:instance-profile/citrees-ray-autoscaler
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 200
            VolumeType: gp3
            DeleteOnTermination: true
      # Allow Docker containers to reach IMDS for instance profile credentials.
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
    resources: {}

  selection_worker:
    node_config:
      InstanceType: c6i.8xlarge # 32 vCPUs, 64GB RAM - heavy feature selection
      ImageId: ami-0030e4319cbf4dbf2
      IamInstanceProfile:
        Arn: arn:aws:iam::__AWS_ACCOUNT__:instance-profile/citrees-ray-autoscaler
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 200
            VolumeType: gp3
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      InstanceMarketOptions:
        MarketType: spot
    resources:
      selection: 100
    min_workers: 0
    max_workers: 250

  eval_worker:
    node_config:
      InstanceType: c6i.xlarge # 4 vCPUs, 8GB RAM - lightweight downstream eval
      ImageId: ami-0030e4319cbf4dbf2
      IamInstanceProfile:
        Arn: arn:aws:iam::__AWS_ACCOUNT__:instance-profile/citrees-ray-autoscaler
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 200
            VolumeType: gp3
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      InstanceMarketOptions:
        MarketType: spot
    resources:
      evaluation: 100
    min_workers: 0
    max_workers: 250

head_node_type: head

# Minimal setup (everything else is baked into Docker image)
setup_commands:
  - echo 'export S3_BUCKET=__S3_BUCKET__' >> ~/.bashrc
  - echo 'export GIT_SHA=__GIT_SHA__' >> ~/.bashrc
  - echo 'export PATH=/app/.venv/bin:$PATH' >> ~/.bashrc

# Override Ray's default pip commands (we use uv in Docker)
head_setup_commands: []
worker_setup_commands: []

head_start_ray_commands:
  - /app/.venv/bin/ray stop
  - S3_BUCKET=__S3_BUCKET__ GIT_SHA=__GIT_SHA__ /app/.venv/bin/ray start --head
    --port=6379 --autoscaling-config=~/ray_bootstrap_config.yaml
    --dashboard-host=0.0.0.0

worker_start_ray_commands:
  - /app/.venv/bin/ray stop
  - S3_BUCKET=__S3_BUCKET__ GIT_SHA=__GIT_SHA__ /app/.venv/bin/ray start
    --address=$RAY_HEAD_IP:6379
