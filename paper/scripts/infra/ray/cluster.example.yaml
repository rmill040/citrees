# Ray Cluster Configuration Template
#
# Usage:
#   1. Generate cluster.yaml with your IP:
#      AWS_PROFILE=personal uv run python paper/scripts/infra/ray/setup_cluster.py --generate
#
#   2. Deploy:
#      AWS_PROFILE=personal uv run ray up paper/scripts/infra/ray/cluster.yaml --yes
#
# Placeholders (replaced during --generate):
#   __MY_IP__    - Your public IP for security group rules
#   __BRANCH__   - Current git branch
#   __S3_BUCKET__ - S3 bucket for results
#
# IAM: Ray auto-creates IAM roles with EC2 + S3 permissions (no manual setup needed)

cluster_name: citrees

provider:
  type: aws
  region: us-east-1
  security_group:
    GroupName: ray-citrees
    IpPermissions:
      # SSH - restricted to your IP
      - FromPort: 22
        ToPort: 22
        IpProtocol: tcp
        IpRanges:
          - CidrIp: __MY_IP__/32
      # Ray GCS
      - FromPort: 6379
        ToPort: 6379
        IpProtocol: tcp
        IpRanges:
          - CidrIp: __MY_IP__/32
      # Ray dashboard
      - FromPort: 8265
        ToPort: 8265
        IpProtocol: tcp
        IpRanges:
          - CidrIp: __MY_IP__/32
      # Ray client
      - FromPort: 10001
        ToPort: 10001
        IpProtocol: tcp
        IpRanges:
          - CidrIp: __MY_IP__/32

auth:
  ssh_user: ubuntu

available_node_types:
  head:
    node_config:
      InstanceType: c6i.4xlarge
      ImageId: ami-0030e4319cbf4dbf2 # Ubuntu 22.04 us-east-1
    resources: {}

  selection_worker:
    node_config:
      InstanceType: c6i.8xlarge # 32 vCPUs, 64GB RAM - heavy feature selection
      ImageId: ami-0030e4319cbf4dbf2
      InstanceMarketOptions:
        MarketType: spot
    resources:
      selection: 100
    min_workers: 0
    max_workers: 250

  eval_worker:
    node_config:
      InstanceType: c6i.xlarge # 4 vCPUs, 8GB RAM - lightweight downstream eval
      ImageId: ami-0030e4319cbf4dbf2
      InstanceMarketOptions:
        MarketType: spot
    resources:
      evaluation: 100
    min_workers: 0
    max_workers: 250

head_node_type: head

setup_commands:
  - sudo apt-get update && sudo apt-get install -y r-base r-base-dev
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - $HOME/.local/bin/uv python install 3.12
  - rm -rf ~/citrees && git clone -b __BRANCH__
    https://github.com/rmill040/citrees.git ~/citrees
  - cd ~/citrees && $HOME/.local/bin/uv sync --group paper
  # Create python wrapper script (symlink bypasses venv detection, wrapper preserves it)
  - sudo rm -f /usr/local/bin/python && echo -e '#!/bin/bash\nexec
    /home/ubuntu/citrees/.venv/bin/python "$@"' | sudo tee /usr/local/bin/python
    > /dev/null && sudo chmod +x /usr/local/bin/python
  # Set S3_BUCKET env var (resolved at generate time, avoids STS calls on workers)
  - echo 'export S3_BUCKET=__S3_BUCKET__' >> ~/.bashrc
  # Provenance: prefer env var to avoid relying on `.git/` at runtime
  - echo 'export GIT_SHA=$(cd ~/citrees && git rev-parse HEAD)' >> ~/.bashrc

# Override Ray's default pip commands (we use uv)
head_setup_commands: []
worker_setup_commands: []

head_start_ray_commands:
  - $HOME/citrees/.venv/bin/ray stop
  - S3_BUCKET=__S3_BUCKET__ GIT_SHA="$(cd $HOME/citrees && git rev-parse HEAD)"
    $HOME/citrees/.venv/bin/ray start --head --port=6379
    --autoscaling-config=~/ray_bootstrap_config.yaml --dashboard-host=0.0.0.0

worker_start_ray_commands:
  - $HOME/citrees/.venv/bin/ray stop
  - S3_BUCKET=__S3_BUCKET__ GIT_SHA="$(cd $HOME/citrees && git rev-parse HEAD)"
    $HOME/citrees/.venv/bin/ray start --address=$RAY_HEAD_IP:6379
