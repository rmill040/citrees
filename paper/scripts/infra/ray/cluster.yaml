cluster_name: citrees

provider:
  type: aws
  region: us-east-1

auth:
  ssh_user: ubuntu

available_node_types:
  head:
    node_config:
      InstanceType: c7i.4xlarge
      ImageId: ami-0030e4319cbf4dbf2  # Ubuntu 22.04 us-east-1
    resources: {}

  selection_worker:
    node_config:
      InstanceType: c7i.8xlarge  # 32 vCPUs, 64GB RAM - heavy feature selection
      ImageId: ami-0030e4319cbf4dbf2
      InstanceMarketOptions:
        MarketType: spot
        SpotOptions:
          SpotInstanceType: persistent
          InstanceInterruptionBehavior: terminate
    resources:
      selection: 100
    min_workers: 0
    max_workers: 250

  eval_worker:
    node_config:
      InstanceType: c7i.4xlarge  # 16 vCPUs, 32GB RAM - lighter downstream eval
      ImageId: ami-0030e4319cbf4dbf2
      InstanceMarketOptions:
        MarketType: spot
        SpotOptions:
          SpotInstanceType: persistent
          InstanceInterruptionBehavior: terminate
    resources:
      evaluation: 100
    min_workers: 0
    max_workers: 250

head_node_type: head
worker_default_node_type: selection_worker

setup_commands:
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - $HOME/.local/bin/uv python install 3.12
  - git clone https://github.com/rmill040/citrees.git ~/citrees || (cd ~/citrees && git pull)
  - cd ~/citrees && $HOME/.local/bin/uv sync --group paper

head_start_ray_commands:
  - ray stop
  - ray start --head --port=6379 --dashboard-host=0.0.0.0

worker_start_ray_commands:
  - ray stop
  - ray start --address=$RAY_HEAD_IP:6379
